<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PegasusHub | Notebook Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link id="hljs-theme-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <link id="hljs-theme-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --surface2: #1e293b;
            --border: rgba(148, 163, 184, 0.15); --border-strong: rgba(148, 163, 184, 0.25);
            --primary: #22d3ee; --primary-glow: rgba(34, 211, 238, 0.12);
            --text-main: #f1f5f9; --text-muted: #94a3b8; --text-dim: #64748b;
            --glass: rgba(15, 23, 42, 0.97);
            --code-bg: #0d1117; --out-bg: #080e1a;
            --md-h: #f8fafc; --md-link: #22d3ee;
            --exec-color: #22d3ee;
            --error-bg: rgba(239, 68, 68, 0.08); --error-border: rgba(239, 68, 68, 0.3);
            --stream-bg: #080e1a;
        }
        body.light-mode {
            --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
            --border: #e2e8f0; --border-strong: #cbd5e1;
            --primary: #0284c7; --primary-glow: rgba(2, 132, 199, 0.08);
            --text-main: #0f172a; --text-muted: #475569; --text-dim: #94a3b8;
            --glass: rgba(255,255,255,0.97);
            --code-bg: #f6f8fa; --out-bg: #f8fafc;
            --md-h: #0f172a; --md-link: #0891b2;
            --exec-color: #0891b2;
            --error-bg: rgba(239, 68, 68, 0.06); --error-border: rgba(239, 68, 68, 0.25);
            --stream-bg: #f6f8fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* ── NAV ── */
        nav {
            height: 60px; padding: 0 5%; background: var(--glass);
            backdrop-filter: blur(16px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.3rem; text-decoration: none; color: var(--text-main); letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo i, .logo span { color: var(--primary); }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .btn-back {
            display: flex; align-items: center; gap: 7px; color: var(--text-muted);
            text-decoration: none; font-size: 0.8rem; font-weight: 700;
            padding: 7px 14px; border: 1px solid var(--border); border-radius: 9px;
            transition: 0.2s; letter-spacing: 0.3px;
        }
        .btn-back:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-glow); }
        .theme-toggle {
            background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
            width: 38px; height: 38px; border-radius: 9px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
            transition: 0.2s;
        }
        .theme-toggle:hover { color: var(--primary); border-color: var(--primary); }

        /* ── TOOLBAR ── */
        .toolbar {
            padding: 10px 5%; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
            transition: background 0.3s;
        }
        .toolbar-left { display: flex; flex-direction: column; gap: 2px; }
        .notebook-title { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }
        .notebook-sub { font-size: 0.68rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; }
        .toolbar-actions { display: flex; gap: 8px; }
        .action-btn {
            display: flex; align-items: center; gap: 6px;
            background: transparent; color: var(--text-muted); border: 1px solid var(--border);
            padding: 6px 13px; border-radius: 8px; font-size: 0.78rem; font-weight: 700;
            cursor: pointer; text-decoration: none; transition: 0.2s; font-family: inherit; letter-spacing: 0.3px;
        }
        .action-btn:hover { color: var(--primary); border-color: var(--primary); background: var(--primary-glow); }

        /* ── SCROLL AREA (overridden below with TOC layout) ── */

        /* ── NOTEBOOK ── */
        .notebook { max-width: 980px; margin: 0 auto; padding: 40px 32px 100px; }

        /* ── LOADER ── */
        .loader {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 18px; min-height: 60vh;
        }
        .spinner {
            width: 42px; height: 42px; border: 3px solid var(--surface2);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { color: var(--text-dim); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

        /* ── CELLS ── */
        .cell { margin-bottom: 6px; }

        /* Markdown cell */
        .cell-md {
            padding: 14px 0;
            line-height: 1.85;
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* H1 — big section title with cyan gradient */
        .cell-md h1 {
            font-size: 2rem; font-weight: 800; letter-spacing: -1px; line-height: 1.2;
            margin: 0.6em 0 0.5em;
            background: linear-gradient(135deg, var(--primary) 0%, #818cf8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            padding-bottom: 0.5em; border-bottom: 1px solid var(--border);
        }
        /* H2 — section header with cyan left accent */
        .cell-md h2 {
            font-size: 1.35rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.3;
            margin: 1.8em 0 0.6em;
            color: var(--text-main);
            padding-left: 14px;
            border-left: 3px solid var(--primary);
        }
        /* H3 — subsection, muted cyan */
        .cell-md h3 {
            font-size: 1.05rem; font-weight: 700; letter-spacing: 0.3px;
            margin: 1.4em 0 0.5em;
            color: var(--primary);
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1.5px;
        }
        /* H4 — label style */
        .cell-md h4 {
            font-size: 0.88rem; font-weight: 700; color: var(--text-dim);
            margin: 1.2em 0 0.4em; text-transform: uppercase; letter-spacing: 1px;
        }
        .cell-md p { margin-bottom: 1em; color: var(--text-muted); }
        .cell-md strong { color: var(--text-main); font-weight: 700; }
        .cell-md em { color: var(--primary); font-style: italic; }
        .cell-md a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .cell-md a:hover { text-decoration: underline; opacity: 0.85; }
        .cell-md ul { padding-left: 0; margin-bottom: 1em; list-style: none; }
        .cell-md ul li {
            padding: 4px 0 4px 22px; position: relative; color: var(--text-muted);
        }
        .cell-md ul li::before {
            content: ''; position: absolute; left: 6px; top: 13px;
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--primary); opacity: 0.7;
        }
        .cell-md blockquote {
            border-left: 3px solid var(--primary); margin: 1.4em 0;
            padding: 12px 20px; background: var(--primary-glow);
            border-radius: 0 10px 10px 0; color: var(--text-muted);
            font-style: italic;
        }
        .cell-md code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--surface2); color: var(--primary);
            padding: 2px 7px; border-radius: 5px; font-size: 0.83em;
            border: 1px solid var(--border);
        }
        .cell-md pre {
            background: var(--code-bg); border-radius: 10px; padding: 18px;
            overflow-x: auto; margin: 1.4em 0;
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
        }
        .cell-md pre code { background: transparent; color: inherit; padding: 0; font-size: 0.85rem; border: none; }
        .cell-md table { width: 100%; border-collapse: collapse; margin: 1.4em 0; font-size: 0.9rem; border-radius: 10px; overflow: hidden; }
        .cell-md thead { background: linear-gradient(135deg, rgba(34,211,238,0.15), rgba(129,140,248,0.1)); }
        .cell-md th { color: var(--primary); font-weight: 700; padding: 10px 14px; text-align: left; border: 1px solid var(--border); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.8px; }
        .cell-md td { padding: 9px 14px; border: 1px solid var(--border); color: var(--text-muted); }
        .cell-md tr:nth-child(even) td { background: var(--surface2); }
        .cell-md img { display: block; max-width: 80%; margin: 1.8em auto; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid var(--border); }
        .cell-md hr { border: none; border-top: 1px solid var(--border); margin: 2.4em 0; position: relative; }
        .cell-md hr::after { content: '◆'; position: absolute; left: 50%; transform: translateX(-50%) translateY(-55%); background: var(--bg); padding: 0 10px; color: var(--primary); font-size: 0.6rem; opacity: 0.5; }

        /* Ordered list → cards */
        .ol-cards {
            display: flex; flex-wrap: wrap; gap: 16px;
            margin: 1.6em 0; list-style: none; padding: 0;
        }
        .ol-cards li {
            flex: 1 1 280px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 22px 22px 22px 62px;
            position: relative; line-height: 1.7; font-size: 0.96rem;
            color: var(--text-muted); transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }
        .ol-cards li:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow), 0 8px 24px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }
        .ol-cards li strong { color: var(--text-main); }
        .ol-cards li .card-num {
            position: absolute; left: 18px; top: 20px;
            width: 30px; height: 30px; border-radius: 8px;
            background: var(--primary-glow); border: 1px solid var(--primary);
            color: var(--primary); font-size: 0.78rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Code input cell */
        .cell-code { margin-bottom: 2px; }
        .cell-in-wrap {
            display: flex; align-items: stretch; gap: 0;
            border-radius: 10px 10px 0 0; overflow: hidden;
            border: 1px solid var(--border); border-bottom: none;
        }
        .cell-in-wrap.no-output { border-radius: 10px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .exec-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; font-weight: 600; color: var(--exec-color);
            background: var(--surface2); padding: 14px 10px 0;
            min-width: 54px; text-align: right;
            user-select: none; flex-shrink: 0;
            border-right: 1px solid var(--border);
        }
        .cell-source {
            flex: 1; background: var(--code-bg); overflow-x: auto;
        }
        .cell-source pre {
            margin: 0; padding: 14px 16px;
        }
        .cell-source pre code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; line-height: 1.65;
            background: transparent !important;
        }

        /* Output area */
        .cell-outputs { border: 1px solid var(--border); border-top: 1px solid var(--border-strong); border-radius: 0 0 10px 10px; overflow: hidden; margin-bottom: 16px; }
        .cell-out-wrap { display: flex; align-items: stretch; }
        .out-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; font-weight: 600; color: var(--text-dim);
            background: var(--surface2); padding: 10px 10px 0;
            min-width: 54px; text-align: right;
            user-select: none; flex-shrink: 0;
            border-right: 1px solid var(--border);
        }
        .cell-out {
            flex: 1; background: var(--out-bg);
            padding: 10px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; line-height: 1.6;
            color: var(--text-muted);
            overflow-x: auto;
        }
        .cell-out pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
        .cell-out-stream { background: var(--stream-bg); border-top: 1px solid var(--border); }
        .cell-out-stream pre { color: var(--text-muted); }
        .cell-out-stderr { background: rgba(251,191,36,0.05); border-left: 3px solid rgba(251,191,36,0.4); }
        .cell-out-stderr pre { color: #fbbf24; }
        .cell-out img { display: block; max-width: 80%; margin: 1em auto; border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.25); }
        .cell-out-error {
            background: var(--error-bg); border-left: 3px solid var(--error-border);
            padding: 10px 16px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; line-height: 1.6; color: #f87171; white-space: pre-wrap;
        }
        .cell-out table { border-collapse: collapse; font-size: 0.8rem; width: 100%; }
        .cell-out th { background: var(--surface2); color: var(--text-main); font-weight: 700; padding: 6px 10px; border: 1px solid var(--border); }
        .cell-out td { padding: 5px 10px; border: 1px solid var(--border); color: var(--text-muted); }
        .cell-out tr:nth-child(even) td { background: var(--surface2); }

        /* Raw cell */
        .cell-raw {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
            color: var(--text-dim); line-height: 1.6;
        }

        /* Error state */
        .error-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 16px; min-height: 60vh; text-align: center;
        }
        .error-state i { font-size: 2.5rem; color: #f43f5e; }
        .error-state p { color: var(--text-muted); font-size: 0.95rem; }

        /* ── PROGRESS BAR ── */
        .progress-bar {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, var(--primary), #818cf8);
            z-index: 9999; transition: width 0.1s linear;
            box-shadow: 0 0 8px var(--primary);
        }

        /* ── LAYOUT WITH TOC ── */
        .viewer-layout { flex: 1; display: flex; overflow: hidden; min-height: 0; }
        .viewer { flex: 1; overflow-y: auto; background: var(--bg); transition: background 0.3s; }
        .viewer::-webkit-scrollbar { width: 6px; }
        .viewer::-webkit-scrollbar-track { background: transparent; }
        .viewer::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

        /* ── TOC SIDEBAR ── */
        .toc-sidebar {
            width: 240px; flex-shrink: 0; overflow-y: auto;
            border-left: 1px solid var(--border); background: var(--surface);
            padding: 20px 0; transition: background 0.3s, transform 0.3s;
        }
        .toc-sidebar::-webkit-scrollbar { width: 4px; }
        .toc-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .toc-header {
            font-size: 0.65rem; font-weight: 800; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1.5px;
            padding: 0 16px 12px; border-bottom: 1px solid var(--border); margin-bottom: 10px;
        }
        .toc-item {
            display: block; padding: 5px 16px; font-size: 0.78rem; font-weight: 500;
            color: var(--text-dim); text-decoration: none; cursor: pointer;
            border-left: 2px solid transparent; transition: 0.15s; line-height: 1.4;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .toc-item:hover { color: var(--text-main); background: var(--primary-glow); }
        .toc-item.active { color: var(--primary); border-left-color: var(--primary); background: var(--primary-glow); font-weight: 700; }
        .toc-item.h1 { padding-left: 16px; font-weight: 700; color: var(--text-muted); }
        .toc-item.h2 { padding-left: 24px; }
        .toc-item.h3 { padding-left: 36px; font-size: 0.73rem; }
        .toc-empty { padding: 12px 16px; font-size: 0.75rem; color: var(--text-dim); font-style: italic; }

        /* ── COPY BUTTON ── */
        .cell-in-wrap { position: relative; }
        .copy-btn {
            position: absolute; top: 8px; right: 10px; z-index: 10;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text-dim); font-size: 0.7rem; font-weight: 700;
            padding: 4px 10px; border-radius: 6px; cursor: pointer;
            font-family: inherit; display: flex; align-items: center; gap: 5px;
            opacity: 0; transition: opacity 0.2s, color 0.2s, border-color 0.2s;
        }
        .cell-in-wrap:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { color: var(--primary); border-color: var(--primary); }
        .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

        /* ── SCROLL TO TOP ── */
        .scroll-top {
            position: fixed; bottom: 32px; right: 32px; z-index: 200;
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-muted); cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.2s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .scroll-top.visible { opacity: 1; pointer-events: all; }
        .scroll-top:hover { color: var(--primary); border-color: var(--primary); transform: translateY(-2px); }

        /* ── READ TIME badge ── */
        .read-time { font-size: 0.68rem; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; margin-top: 2px; }

        /* ── COURSE NAV ── */
        .course-nav {
            display: flex; align-items: stretch; justify-content: space-between; gap: 16px;
            margin: 48px 0 0; padding-top: 32px; border-top: 1px solid var(--border);
        }
        .course-nav-btn {
            flex: 1; display: flex; align-items: center; gap: 14px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 22px; text-decoration: none;
            color: var(--text-muted); transition: 0.2s; cursor: pointer;
            max-width: 48%;
        }
        .course-nav-btn:hover { border-color: var(--primary); color: var(--text-main); box-shadow: 0 0 0 3px var(--primary-glow); }
        .course-nav-btn.next { flex-direction: row-reverse; text-align: right; margin-left: auto; }
        .course-nav-btn .nav-icon {
            width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
            background: var(--primary-glow); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: 0.9rem; transition: 0.2s;
        }
        .course-nav-btn:hover .nav-icon { background: var(--primary); color: #fff; border-color: var(--primary); }
        .course-nav-btn .nav-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); margin-bottom: 3px; }
        .course-nav-btn .nav-title { font-size: 0.9rem; font-weight: 700; color: var(--text-main); line-height: 1.3; }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html" class="logo"><i class="fas fa-layer-group"></i> PEGASUS<span>HUB</span></a>
        <div class="nav-right">
            <a href="academy.html" class="btn-back"><i class="fas fa-arrow-left"></i> Academy</a>
            <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <div class="progress-bar" id="progress-bar"></div>

    <div class="toolbar">
        <div class="toolbar-left">
            <span class="notebook-title" id="page-title">Loading...</span>
            <span class="notebook-sub">Jupyter Notebook &nbsp;·&nbsp; <span id="read-time"></span></span>
        </div>
        <div class="toolbar-actions">
            <a href="#" id="download-btn" target="_blank" class="action-btn">
                <i class="fas fa-download"></i> Download
            </a>
            <a href="#" id="repo-link" target="_blank" class="action-btn">
                <i class="fab fa-github"></i> Source
            </a>
            <button class="action-btn" onclick="toggleFullscreen()">
                <i class="fas fa-expand"></i> Fullscreen
            </button>
        </div>
    </div>

    <div class="viewer-layout">
        <div class="viewer" id="viewer">
            <div class="notebook" id="notebook">
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p>Loading Notebook...</p>
                </div>
            </div>
        </div>
        <aside class="toc-sidebar" id="toc-sidebar">
            <div class="toc-header"><i class="fas fa-list"></i> &nbsp;Contents</div>
            <div id="toc-list"><p class="toc-empty">Loading...</p></div>
        </aside>
    </div>

    <button class="scroll-top" id="scroll-top" onclick="document.getElementById('viewer').scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script>
        /* ── Theme ── */
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.querySelector('.theme-toggle i').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            document.getElementById('hljs-theme-dark').disabled = isLight;
            document.getElementById('hljs-theme-light').disabled = !isLight;
        }
        if (localStorage.getItem('theme') !== 'dark') {
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle i').className = 'fas fa-sun';
            document.getElementById('hljs-theme-dark').disabled = true;
            document.getElementById('hljs-theme-light').disabled = false;
        }

        /* ── Params ── */
        const params       = new URLSearchParams(window.location.search);
        const title        = params.get('title');
        const notebookPath = params.get('notebook'); // e.g. owner/repo/blob/branch/path/to/nb.ipynb

        if (!title || !notebookPath) {
            showError('Invalid or missing notebook URL.');
        } else {
            document.getElementById('page-title').innerText = decodeURIComponent(title);
            document.getElementById('repo-link').href  = 'https://github.com/' + notebookPath;
            document.getElementById('download-btn').href = 'https://raw.githubusercontent.com/' + notebookPath.replace('/blob/', '/');
            loadCourses().then(() => loadNotebook(notebookPath));
        }

        /* ── Loader ── */
        async function loadNotebook(path) {
            const rawUrl = 'https://raw.githubusercontent.com/' + path.replace('/blob/', '/');
            // Base directory URL for resolving relative image paths
            const rawBase = rawUrl.substring(0, rawUrl.lastIndexOf('/') + 1);
            try {
                const res = await fetch(rawUrl);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const nb  = await res.json();
                renderNotebook(nb, rawBase);
            } catch (e) {
                showError('Could not load notebook: ' + e.message);
            }
        }

        /* ── Renderer ── */
        function renderNotebook(nb, rawBase) {
            const container = document.getElementById('notebook');
            container.innerHTML = '';

            const cells = nb.cells || nb.worksheets?.[0]?.cells || [];
            if (cells.length === 0) {
                container.innerHTML = '<div class="loader"><p>Empty notebook</p></div>';
                return;
            }

            cells.forEach((cell, idx) => {
                const src = (cell.source || cell.input || []).join('');
                if (!src.trim() && (cell.cell_type === 'code') && !(cell.outputs?.length)) return;

                if (cell.cell_type === 'markdown') {
                    container.appendChild(renderMarkdown(src, cell.attachments, rawBase));
                } else if (cell.cell_type === 'code') {
                    container.appendChild(renderCode(src, cell.execution_count, cell.outputs || [], rawBase));
                } else if (cell.cell_type === 'raw') {
                    container.appendChild(renderRaw(src));
                }
            });

            hljs.highlightAll();
            buildTOC();
            addCopyButtons();
            calcReadTime();
            buildCourseNav();
        }

        function b64clean(val) {
            // Normalize: join array lines, strip all whitespace
            return (Array.isArray(val) ? val.join('') : val).replace(/\s/g, '');
        }

        function olToCards(container) {
            container.querySelectorAll('ol').forEach(ol => {
                ol.classList.add('ol-cards');
                let n = 1;
                ol.querySelectorAll(':scope > li').forEach(li => {
                    const num = document.createElement('span');
                    num.className = 'card-num';
                    num.textContent = n++;
                    li.prepend(num);
                });
            });
        }

        function resolveImgSrc(src, rawBase) {
            if (!src || src.startsWith('http') || src.startsWith('data:') || src.startsWith('//')) return src;
            return rawBase + src;
        }

        function renderMarkdown(src, attachments, rawBase) {
            // Resolve attachment: URIs before parsing
            if (attachments) {
                src = src.replace(/!\[([^\]]*)\]\(attachment:([^)]+)\)/g, (match, alt, filename) => {
                    const att = attachments[filename];
                    if (!att) return match;
                    const mimeType = Object.keys(att)[0];
                    if (mimeType === 'image/svg+xml') {
                        const svg = Array.isArray(att[mimeType]) ? att[mimeType].join('') : att[mimeType];
                        return `![${alt}](data:image/svg+xml;base64,${btoa(unescape(encodeURIComponent(svg)))})`;
                    }
                    return `![${alt}](data:${mimeType};base64,${b64clean(att[mimeType])})`;
                });
            }
            const div = document.createElement('div');
            div.className = 'cell cell-md';
            div.innerHTML = marked.parse(src);
            // Fix all relative img srcs after parsing (catches ![]() and <img> tags)
            if (rawBase) {
                div.querySelectorAll('img').forEach(img => {
                    img.src = resolveImgSrc(img.getAttribute('src'), rawBase);
                });
            }
            olToCards(div);
            return div;
        }

        function renderCode(src, execCount, outputs, rawBase) {
            const wrap = document.createElement('div');
            wrap.className = 'cell cell-code';

            const hasOutputs = outputs.length > 0;

            // Input
            const inWrap = document.createElement('div');
            inWrap.className = 'cell-in-wrap' + (hasOutputs ? '' : ' no-output');

            const label = document.createElement('div');
            label.className = 'exec-count';
            label.textContent = execCount != null ? `[${execCount}]:` : '[ ]:';

            const srcDiv = document.createElement('div');
            srcDiv.className = 'cell-source';
            const pre = document.createElement('pre');
            const code = document.createElement('code');
            code.className = 'language-python';
            code.textContent = src;
            pre.appendChild(code);
            srcDiv.appendChild(pre);

            inWrap.appendChild(label);
            inWrap.appendChild(srcDiv);
            wrap.appendChild(inWrap);

            // Outputs
            if (hasOutputs) {
                const outsDiv = document.createElement('div');
                outsDiv.className = 'cell-outputs';
                outputs.forEach((out, i) => {
                    outsDiv.appendChild(renderOutput(out, execCount, i, rawBase));
                });
                wrap.appendChild(outsDiv);
            }

            return wrap;
        }

        function arr(v) { return Array.isArray(v) ? v.join('') : (v || ''); }

        function makeImg(b64, mime) {
            const img = document.createElement('img');
            try {
                img.src = 'data:' + mime + ';base64,' + b64clean(b64);
            } catch(e) {}
            return img;
        }

        function stripAnsi(s) { return s.replace(/\x1b\[[0-9;]*[mGKHF]/g, ''); }

        function renderOutput(out, execCount, idx, rawBase) {
            const wrap = document.createElement('div');
            wrap.className = 'cell-out-wrap';

            const label = document.createElement('div');
            label.className = 'out-label';
            const content = document.createElement('div');

            /* ── Error ── */
            if (out.output_type === 'error') {
                label.textContent = '';
                content.className = 'cell-out-error';
                const tb = stripAnsi((out.traceback || []).join('\n'));
                content.textContent = (out.ename + ': ' + out.evalue + '\n\n' + tb).trim();
                wrap.appendChild(label); wrap.appendChild(content);
                return wrap;
            }

            /* ── Stream (print / stderr) ── */
            if (out.output_type === 'stream') {
                const text = arr(out.text);
                if (!text.trim()) return document.createDocumentFragment();
                label.textContent = '';
                content.className = 'cell-out cell-out-stream' + (out.name === 'stderr' ? ' cell-out-stderr' : '');
                const pre = document.createElement('pre');
                pre.textContent = stripAnsi(text);
                content.appendChild(pre);
                wrap.appendChild(label); wrap.appendChild(content);
                return wrap;
            }

            /* ── display_data / execute_result ── */
            const isResult = out.output_type === 'execute_result';
            label.textContent = isResult && execCount != null ? `[${execCount}]:` : '';
            content.className = 'cell-out';

            // nbformat v4 uses out.data, v3 uses out.png / out.jpeg etc.
            const data  = out.data || {};
            const png   = data['image/png']      || out.png;
            const jpeg  = data['image/jpeg']     || out.jpeg;
            const svg   = data['image/svg+xml']  || out.svg;
            const html  = data['text/html']      || out.html;
            const latex = data['text/latex'];
            const plain = data['text/plain']     || out.text;

            if (png) {
                content.appendChild(makeImg(png, 'image/png'));
            } else if (jpeg) {
                content.appendChild(makeImg(jpeg, 'image/jpeg'));
            } else if (svg) {
                content.innerHTML = arr(svg);
            } else if (html) {
                const htmlStr = arr(html).replace(/src="(?!http|data|\/\/)([^"]+)"/g,
                    (m, p) => `src="${resolveImgSrc(p, rawBase)}"`);
                content.innerHTML = htmlStr;
            } else if (latex) {
                const pre = document.createElement('pre');
                pre.textContent = arr(latex);
                content.appendChild(pre);
            } else if (plain) {
                const text = stripAnsi(arr(plain));
                if (!text.trim()) return document.createDocumentFragment();
                const pre = document.createElement('pre');
                pre.textContent = text;
                content.appendChild(pre);
            } else {
                return document.createDocumentFragment(); // nothing to show
            }

            wrap.appendChild(label); wrap.appendChild(content);
            return wrap;
        }

        function renderRaw(src) {
            const div = document.createElement('div');
            div.className = 'cell cell-raw';
            div.textContent = src;
            return div;
        }

        /* ── TOC ── */
        function buildTOC() {
            const headings = document.querySelectorAll('#notebook .cell-md h1, #notebook .cell-md h2, #notebook .cell-md h3');
            const list = document.getElementById('toc-list');
            if (!headings.length) { list.innerHTML = '<p class="toc-empty">No headings found</p>'; return; }
            list.innerHTML = '';
            headings.forEach((h, i) => {
                h.id = 'heading-' + i;
                const level = h.tagName.toLowerCase();
                const item = document.createElement('a');
                item.className = 'toc-item ' + level;
                item.textContent = h.textContent;
                item.onclick = () => {
                    h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
                    item.classList.add('active');
                };
                list.appendChild(item);
            });
            // Highlight active on scroll
            const viewer = document.getElementById('viewer');
            viewer.addEventListener('scroll', () => {
                const scrollY = viewer.scrollTop + 100;
                let current = 0;
                headings.forEach((h, i) => { if (h.offsetTop <= scrollY) current = i; });
                document.querySelectorAll('.toc-item').forEach((t, i) => t.classList.toggle('active', i === current));
            }, { passive: true });
        }

        /* ── COPY BUTTONS ── */
        function addCopyButtons() {
            document.querySelectorAll('.cell-in-wrap').forEach(wrap => {
                const code = wrap.querySelector('code');
                if (!code) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                btn.onclick = () => {
                    navigator.clipboard.writeText(code.textContent).then(() => {
                        btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                        btn.classList.add('copied');
                        setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copy'; btn.classList.remove('copied'); }, 2000);
                    });
                };
                wrap.appendChild(btn);
            });
        }

        /* ── READ TIME ── */
        function calcReadTime() {
            const text = document.getElementById('notebook').innerText || '';
            const words = text.trim().split(/\s+/).length;
            const mins = Math.max(1, Math.round(words / 200));
            document.getElementById('read-time').textContent = `~${mins} min read`;
        }

        /* ── COURSE NAV (loaded from data/courses.json) ── */
        let COURSES = [];

        async function loadCourses() {
            try {
                const res = await fetch('../assets/data/courses.json');
                const data = await res.json();
                COURSES = data.tutorials;
            } catch(e) {}
        }

        function buildCourseNav() {
            const currentNotebook = params.get('notebook');
            const idx = COURSES.findIndex(c => c.notebook === currentNotebook);
            if (idx === -1) return;

            const prev = COURSES[idx - 1];
            const next = COURSES[idx + 1];

            const nav = document.createElement('div');
            nav.className = 'course-nav';

            if (prev) {
                const a = document.createElement('a');
                a.className = 'course-nav-btn prev';
                a.href = `lesson.html?title=${encodeURIComponent(prev.title)}&notebook=${encodeURIComponent(prev.notebook)}`;
                a.innerHTML = `<div class="nav-icon"><i class="fas fa-arrow-left"></i></div>
                    <div><div class="nav-label">Previous</div><div class="nav-title">${prev.title}</div></div>`;
                nav.appendChild(a);
            } else {
                nav.appendChild(document.createElement('div')); // spacer
            }

            if (next) {
                const a = document.createElement('a');
                a.className = 'course-nav-btn next';
                a.href = `lesson.html?title=${encodeURIComponent(next.title)}&notebook=${encodeURIComponent(next.notebook)}`;
                a.innerHTML = `<div class="nav-icon"><i class="fas fa-arrow-right"></i></div>
                    <div><div class="nav-label">Next</div><div class="nav-title">${next.title}</div></div>`;
                nav.appendChild(a);
            }

            document.getElementById('notebook').appendChild(nav);
        }

        /* ── PROGRESS BAR & SCROLL TOP ── */
        document.getElementById('viewer').addEventListener('scroll', function() {
            const el = this;
            const pct = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('scroll-top').classList.toggle('visible', el.scrollTop > 300);
        }, { passive: true });

        /* ── Error ── */
        function showError(msg) {
            document.getElementById('page-title').innerText = 'Notebook Not Found';
            document.getElementById('notebook').innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <p>${msg}</p>
                    <a href="academy.html" class="action-btn" style="margin-top:8px;"><i class="fas fa-arrow-left"></i> Return to Academy</a>
                </div>`;
        }

        /* ── Fullscreen ── */
        function toggleFullscreen() {
            const el = document.getElementById('viewer');
            if (!document.fullscreenElement) {
                (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        }
    </script>
</body>
