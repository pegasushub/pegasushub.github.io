<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PegasusHub | Workflow Details</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.1/markdown-it.min.js"></script>

    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --surface2: #1e293b;
            --border: rgba(148,163,184,0.1); --border2: rgba(148,163,184,0.18);
            --primary: #22d3ee; --primary-glow: rgba(34,211,238,0.15);
            --text-main: #f8fafc; --text-muted: #94a3b8; --text-dim: #475569;
            --glass: rgba(15,23,42,0.92);
            --indigo: #818cf8; --violet: #a78bfa;
        }
        body.light-mode {
            --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
            --border: #e2e8f0; --border2: #cbd5e1;
            --primary: #0284c7; --primary-glow: rgba(2,132,199,0.1);
            --text-main: #0f172a; --text-muted: #475569; --text-dim: #94a3b8;
            --glass: rgba(255,255,255,0.95);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text-main); min-height:100vh; line-height:1.6; }

        /* ── Progress Bar ── */
        #progress-bar { position:fixed; top:0; left:0; height:3px; background:linear-gradient(90deg,var(--primary),var(--indigo)); width:0%; z-index:9999; transition:width 0.1s; }

        /* ── Nav ── */
        nav {
            height:64px; padding:0 6%; background:var(--glass); backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border); display:flex; justify-content:space-between;
            align-items:center; position:sticky; top:0; z-index:1000;
        }
        .nav-logo { font-weight:800; font-size:1.25rem; text-decoration:none; color:var(--text-main); letter-spacing:-1px; display:flex; align-items:center; gap:8px; }
        .nav-logo i { color:var(--primary); font-size:1.2rem; }
        .nav-logo span { color:var(--primary); }
        .nav-right { display:flex; gap:10px; align-items:center; }
        .btn-back { display:flex; align-items:center; gap:6px; color:var(--text-muted); text-decoration:none; font-size:0.78rem; font-weight:700; padding:7px 14px; border:1px solid var(--border); border-radius:8px; transition:0.2s; letter-spacing:0.3px; }
        .btn-back:hover { color:var(--primary); border-color:var(--primary); background:var(--primary-glow); }
        .theme-toggle { background:transparent; border:1px solid var(--border); color:var(--text-muted); width:34px; height:34px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s; }
        .theme-toggle:hover { color:var(--primary); border-color:var(--primary); }

        /* ── Hero ── */
        .hero {
            background:linear-gradient(180deg, rgba(34,211,238,0.04) 0%, transparent 100%);
            border-bottom:1px solid var(--border);
            padding:52px 6% 44px;
        }
        .hero-inner { max-width:1200px; margin:0 auto; }
        .hero-breadcrumb { display:flex; align-items:center; gap:8px; font-size:0.72rem; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:20px; }
        .hero-breadcrumb a { color:var(--text-dim); text-decoration:none; }
        .hero-breadcrumb a:hover { color:var(--primary); }
        .hero-breadcrumb i { font-size:0.6rem; }

        .hero-badges { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
        .badge { display:inline-flex; align-items:center; gap:5px; font-size:0.7rem; font-weight:700; padding:5px 13px; border-radius:99px; letter-spacing:0.5px; }
        /* Tag color palette — cycle through these */
        .tag-0 { background:rgba(34,211,238,0.12);  color:#22d3ee; border:1px solid rgba(34,211,238,0.3); }
        .tag-1 { background:rgba(129,140,248,0.12); color:#818cf8; border:1px solid rgba(129,140,248,0.3); }
        .tag-2 { background:rgba(167,139,250,0.12); color:#a78bfa; border:1px solid rgba(167,139,250,0.3); }
        .tag-3 { background:rgba(74,222,128,0.12);  color:#4ade80; border:1px solid rgba(74,222,128,0.3); }
        .tag-4 { background:rgba(251,146,60,0.12);  color:#fb923c; border:1px solid rgba(251,146,60,0.3); }
        .tag-5 { background:rgba(244,114,182,0.12); color:#f472b6; border:1px solid rgba(244,114,182,0.3); }
        .tag-6 { background:rgba(251,191,36,0.12);  color:#fbbf24; border:1px solid rgba(251,191,36,0.3); }
        .badge-ver  { background:rgba(129,140,248,0.1); color:var(--indigo); border:1px solid rgba(129,140,248,0.25); }
        .badge-date { background:rgba(148,163,184,0.08); color:var(--text-muted); border:1px solid var(--border2); }

        /* Description block */
        .hero-desc-block {
            margin-top:20px; padding:18px 22px;
            background:rgba(34,211,238,0.04); border:1px solid rgba(34,211,238,0.12);
            border-left:3px solid var(--primary); border-radius:0 14px 14px 0;
        }
        .hero-desc-label { font-size:0.65rem; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
        .hero-desc-text { font-size:1rem; color:var(--text-muted); line-height:1.75; }

        .hero-title {
            font-size:2.8rem; font-weight:800; letter-spacing:-2.5px; line-height:1.15; margin-bottom:14px;
            background:linear-gradient(135deg, var(--text-main) 30%, var(--primary) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .hero-desc { font-size:1.05rem; color:var(--text-muted); max-width:680px; line-height:1.7; }

        .hero-meta { display:flex; flex-wrap:wrap; gap:20px; margin-top:28px; padding-top:24px; border-top:1px solid var(--border); }
        .meta-item { display:flex; align-items:center; gap:8px; }
        .meta-item i { color:var(--primary); font-size:0.85rem; width:16px; text-align:center; }
        .meta-item span { font-size:0.8rem; color:var(--text-muted); }
        .meta-item strong { font-size:0.8rem; color:var(--text-main); font-weight:700; margin-left:2px; }

        /* ── Layout ── */
        .layout { max-width:1200px; margin:0 auto; padding:48px 6% 80px; display:grid; grid-template-columns:1fr 300px; gap:48px; align-items:start; }

        /* ── Content ── */
        #wf-content { font-size:1.03rem; line-height:1.85; color:var(--text-main); }
        #wf-content h1 { font-size:2rem; font-weight:800; letter-spacing:-1.5px; margin:0 0 16px; }
        #wf-content h2 { font-size:1rem; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:2px; margin:48px 0 18px; border-left:3px solid var(--primary); padding-left:15px; }
        #wf-content h3 { font-size:1rem; font-weight:700; color:var(--text-main); margin:32px 0 12px; }
        #wf-content p { margin-bottom:18px; color:var(--text-muted); }
        #wf-content strong { color:var(--text-main); font-weight:700; }
        #wf-content a { color:var(--primary); text-decoration:none; border-bottom:1px solid transparent; transition:border-color 0.2s; }
        #wf-content a:hover { border-bottom-color:var(--primary); }
        /* Inline code */
        #wf-content code { font-family:'JetBrains Mono',monospace; font-size:0.82em; background:var(--surface2); color:var(--primary); padding:2px 8px; border-radius:6px; border:1px solid var(--border); }

        /* Code blocks */
        #wf-content pre {
            position:relative; margin:24px 0; border-radius:12px;
            border:1px solid var(--border); background:var(--surface);
            padding:20px 22px; overflow-x:auto;
        }
        #wf-content pre code { background:none; border:none; padding:0; color:var(--text-muted); font-size:0.83rem; line-height:1.85; font-family:'JetBrains Mono',monospace; }
        .pre-copy {
            position:absolute; top:10px; right:12px;
            background:var(--surface2); border:1px solid var(--border);
            cursor:pointer; color:var(--text-dim); font-size:0.68rem; font-weight:700;
            display:flex; align-items:center; gap:4px; padding:3px 9px; border-radius:6px;
            transition:all 0.2s; font-family:'Plus Jakarta Sans',sans-serif;
        }
        .pre-copy:hover { color:var(--primary); border-color:var(--primary); }
        #wf-content ul { list-style:none; padding:0; margin:18px 0 24px; }
        #wf-content ul li { padding:6px 0 6px 24px; position:relative; color:var(--text-muted); }
        #wf-content ul li::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:8px; height:8px; border-radius:50%; background:var(--primary); box-shadow:0 0 6px var(--primary); }
        #wf-content ol.card-grid { list-style:none; padding:0; margin:28px 0; display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; counter-reset:card-count; }
        #wf-content ol.card-grid li { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px 16px; counter-increment:card-count; color:var(--text-muted); transition:border-color 0.2s,transform 0.2s; }
        #wf-content ol.card-grid li:hover { border-color:var(--primary); transform:translateY(-2px); }
        #wf-content ol.card-grid li::before { content:counter(card-count); display:flex; align-items:center; justify-content:center; width:24px; height:24px; border-radius:7px; background:var(--primary); color:#000; font-weight:800; font-size:0.72rem; margin-bottom:10px; }
        #wf-content ol:not(.card-grid) { padding-left:0; margin:18px 0 24px; list-style:none; counter-reset:ol-counter; }
        #wf-content ol:not(.card-grid) li { counter-increment:ol-counter; padding:5px 0 5px 32px; position:relative; color:var(--text-muted); }
        #wf-content ol:not(.card-grid) li::before { content:counter(ol-counter); position:absolute; left:0; top:5px; width:20px; height:20px; border-radius:6px; background:rgba(34,211,238,0.12); color:var(--primary); font-size:0.7rem; font-weight:800; font-family:'JetBrains Mono'; display:flex; align-items:center; justify-content:center; }
        #wf-content blockquote { margin:28px 0; padding:18px 22px; background:rgba(34,211,238,0.05); border-left:4px solid var(--primary); border-radius:0 12px 12px 0; color:var(--text-muted); font-style:italic; }
        #wf-content img { display:block; max-width:100%; margin:28px auto; border-radius:12px; border:1px solid var(--border); box-shadow:0 8px 30px rgba(0,0,0,0.3); }
        #wf-content table { width:100%; border-collapse:collapse; margin:28px 0; font-size:0.88rem; }
        #wf-content th { background:var(--surface); color:var(--primary); font-weight:700; font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; padding:12px 16px; text-align:left; border-bottom:2px solid var(--border2); }
        #wf-content td { padding:12px 16px; border-bottom:1px solid var(--border); color:var(--text-muted); vertical-align:top; }
        #wf-content tr:hover td { background:rgba(34,211,238,0.03); }
        #wf-content hr { border:none; border-top:1px solid var(--border); margin:40px 0; }

        /* Loading skeleton */
        .skeleton { animation:shimmer 1.6s infinite linear; background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%); background-size:200% 100%; border-radius:8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }


        /* ── Sidebar ── */
        .sidebar { position:sticky; top:80px; display:flex; flex-direction:column; gap:16px; }
        .s-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
        .s-card-header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
        .s-card-header i { color:var(--primary); font-size:0.85rem; }
        .s-card-header span { font-size:0.7rem; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); }
        .s-card-body { padding:16px 18px; }

        .btn-repo { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; background:var(--primary); color:#000; text-align:center; text-decoration:none; border-radius:10px; font-weight:800; font-size:0.8rem; letter-spacing:0.5px; transition:opacity 0.2s; }
        .btn-repo:hover { opacity:0.85; }

        .tree-node { display:flex; align-items:center; gap:8px; font-family:'JetBrains Mono'; font-size:0.75rem; color:var(--text-muted); padding:5px 0; border-bottom:1px solid var(--border); }
        .tree-node:last-child { border:none; }
        .tree-node i { color:var(--primary); font-size:0.7rem; width:12px; }

        .avatar-stack { display:flex; align-items:center; }
        .avatar-stack img { width:34px; height:34px; border-radius:50%; border:2px solid var(--surface); margin-right:-10px; transition:transform 0.2s; }
        .avatar-stack img:hover { transform:translateY(-3px); z-index:1; }

        .meta-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.82rem; }
        .meta-row:last-child { border:none; }
        .meta-row .key { color:var(--text-dim); display:flex; align-items:center; gap:6px; }
        .meta-row .key i { font-size:0.75rem; color:var(--primary); }
        .meta-row .val { font-weight:700; color:var(--text-main); font-family:'JetBrains Mono'; font-size:0.78rem; }

        @media(max-width:960px){ .layout{grid-template-columns:1fr;} .sidebar{position:static;} .hero-title{font-size:2rem;} }

        /* --- TOC --- */
        .toc-link { display:block; font-size:0.78rem; color:var(--text-muted); text-decoration:none; padding:5px 0; border-left:2px solid var(--border); padding-left:12px; transition:all 0.2s; }
        .toc-link:hover, .toc-link.active { color:var(--primary); border-left-color:var(--primary); }
        .toc-link.toc-h3 { padding-left:24px; font-size:0.73rem; }

        /* --- Back to Top --- */
        #back-top { position:fixed; bottom:32px; right:32px; width:40px; height:40px; border-radius:50%; background:var(--primary); color:#000; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.9rem; opacity:0; transform:translateY(10px); transition:all 0.3s; z-index:999; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
        #back-top.visible { opacity:1; transform:translateY(0); }

        /* --- Page Transition --- */
        body { animation: pageFadeIn 0.4s ease forwards; }
        @keyframes pageFadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<nav>
    <a href="../index.html" class="nav-logo">
        <i class="fas fa-layer-group"></i>PEGASUS<span>HUB</span>
    </a>
    <div class="nav-right">
        <a href="workflows.html" class="btn-back"><i class="fas fa-arrow-left"></i> Workflows</a>
        <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
    </div>
</nav>

<!-- Hero -->
<div class="hero">
    <div class="hero-inner">
        <div class="hero-breadcrumb">

</div>

<!-- Main Layout -->
<div class="layout">
    <main>
        <article id="wf-content"></article>

    </main>

    <aside class="sidebar">
        <!-- TOC card -->
        <div class="s-card" id="toc-card" style="display:none;">
            <div class="s-card-header"><i class="fas fa-list"></i><span>Contents</span></div>

                    <div class="skeleton" style="height:14px;margin-bottom:8px;"></div>
                    <div class="skeleton" style="height:14px;margin-bottom:8px;width:80%;"></div>

                    <div class="skeleton" style="width:34px;height:34px;border-radius:50%;margin-right:-10px;"></div>
                    <div class="skeleton" style="width:34px;height:34px;border-radius:50%;margin-right:-10px;"></div>
                    <div class="skeleton" style="width:34px;height:34px;border-radius:50%;"></div>
                </div>
            </div>
        </div>

        <!-- Metadata -->
        <div class="s-card">
            <div class="s-card-header"><i class="fas fa-info-circle"></i><span>Details</span></div>

                    <span class="key"><i class="fas fa-code-branch"></i> Version</span>

</div>

<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

<script>
    const md = window.markdownit({ html: true });

    window.addEventListener('scroll', () => {
        const d = document.documentElement;
        document.getElementById('progress-bar').style.width = (d.scrollTop / (d.scrollHeight - d.clientHeight) * 100) + '%';
        document.getElementById('back-top').classList.toggle('visible', window.scrollY > 400);
    });

    function styleCodeBlocks(container) {
        container.querySelectorAll('pre').forEach(pre => {
            const btn = document.createElement('button');
            btn.className = 'pre-copy';
            btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
            btn.onclick = () => {
                const text = pre.querySelector('code')?.innerText || '';
                navigator.clipboard.writeText(text).then(() => {
                    btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                    btn.style.color = '#4ade80';
                    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copy'; btn.style.color = ''; }, 2000);
                });
            };
            pre.appendChild(btn);
        });
    }

    function olToCards(container) {
        container.querySelectorAll('ol').forEach(ol => {
            if (ol.children.length >= 2) {
                ol.classList.add('card-grid');
                ol.style.counterReset = 'card-count';
            }
        });
    }

    async function init() {
        const saved = localStorage.getItem('theme');
        if (saved !== 'dark') {
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle i').classList.replace('fa-moon', 'fa-sun');
        }

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 'diamond-workflow';

        document.getElementById('hero-id-label').textContent = id;

        const WORKFLOWS_INDEX = 'https://raw.githubusercontent.com/swarmourr/Pegasus-Hub/refs/heads/main/data/workflows.json';

        try {
            const [indexRes, mdRes] = await Promise.all([
                fetch(WORKFLOWS_INDEX),
                fetch(`https://raw.githubusercontent.com/swarmourr/Pegasus-Hub/refs/heads/main/${id}.md`)
            ]);

            if (!mdRes.ok) throw new Error('File not found');

            const indexData = await indexRes.json();
            const meta = (indexData.workflows || []).find(w => w.id === id) || {};

            const raw = await mdRes.text();
            const parts = raw.split('---');
            let body = parts.length >= 3 ? parts.slice(2).join('---') : raw;

            // ── Populate Hero ──
            const title = meta.name || id;
            document.title = `PegasusHub | ${title}`;
            document.getElementById('hero-title').textContent = title;
            document.getElementById('hero-id-label').textContent = title;

            if (meta.description) {
                document.getElementById('hero-desc').textContent = meta.description;
                document.getElementById('hero-desc-block').style.display = 'block';
            }

            // Multi-color tags — split by comma or semicolon
            if (meta.topic) {
                const tags = meta.topic.split(/[,;]/).map(t => t.trim()).filter(Boolean);
                const badgesEl = document.getElementById('hero-badges');
                tags.forEach((tag, i) => {
                    const s = document.createElement('span');
                    s.className = `badge tag-${i % 7}`;
                    s.innerHTML = `<i class="fas fa-tag"></i> ${tag}`;
                    badgesEl.prepend(s);
                });
                // sidebar topic
                document.getElementById('m-topic').textContent = tags.join(', ');
                document.getElementById('row-topic').style.display = 'flex';
            }
            if (meta.pegasus_version) {
                document.getElementById('hero-ver-text').textContent = meta.pegasus_version;
                document.getElementById('hero-ver').style.display = 'inline-flex';
            }
            if (meta.last_verified) {
                document.getElementById('hero-date-text').textContent = meta.last_verified;
                document.getElementById('hero-date').style.display = 'inline-flex';
            }
            if (meta.license) {
                document.getElementById('meta-license-text').textContent = meta.license;
                document.getElementById('meta-license').style.display = 'flex';
                document.getElementById('hero-meta').style.display = 'flex';
                document.getElementById('m-license').textContent = meta.license;
                document.getElementById('row-license').style.display = 'flex';
            }
            if (meta.topic) {
                document.getElementById('m-topic').textContent = meta.topic;
                document.getElementById('row-topic').style.display = 'flex';
            }

            // ── Sidebar Metadata ──
            document.getElementById('m-ver').textContent = meta.pegasus_version || '5.0';
            document.getElementById('m-date').textContent = meta.last_verified || '2026';
            document.getElementById('gh-link').href = meta.github_repo || '#';

            if (meta.github_repo && meta.github_repo.includes('github.com')) {
                const repoPath = new URL(meta.github_repo).pathname.split('/').filter(x => x);
                document.getElementById('meta-repo-text').textContent = repoPath.slice(0, 2).join('/');
                document.getElementById('meta-repo').style.display = 'flex';
                document.getElementById('hero-meta').style.display = 'flex';
                fetchGitHub(repoPath[0], repoPath[1]);
            }

            // Strip SVG code blocks entirely
            body = body.replace(/```[^\n]*\n[\s\S]*?<svg[\s\S]*?```/gi, '');
            // Strip inline SVG tags
            body = body.replace(/<svg[\s\S]*?<\/svg>/gi, '');

            // ── Render Body ──
            const wfEl = document.getElementById('wf-content');
            wfEl.innerHTML = md.render(body);

            // Resolve relative image paths to raw GitHub URLs
            const rawBase = `https://raw.githubusercontent.com/swarmourr/Pegasus-Hub/refs/heads/main/`;
            wfEl.querySelectorAll('img').forEach(img => {
                const src = img.getAttribute('src') || '';
                if (src && !src.startsWith('http') && !src.startsWith('data:')) {
                    img.src = rawBase + src.replace(/^\.?\/?/, '');
                }
            });

            styleCodeBlocks(wfEl);
            olToCards(wfEl);

            // ── Reading Time ──
            const wordCount = wfEl.innerText.trim().split(/\s+/).filter(Boolean).length;
            const readMins = Math.ceil(wordCount / 200);
            const badgesEl = document.getElementById('hero-badges');
            const readBadge = document.createElement('span');
            readBadge.className = 'badge badge-date';
            readBadge.innerHTML = `<i class="fas fa-clock"></i> ${readMins} min read`;
            badgesEl.appendChild(readBadge);

            // ── Table of Contents ──
            buildTOC();

        } catch (e) {
            document.getElementById('hero-title').textContent = 'Workflow Not Found';
            document.getElementById('hero-desc-block').style.display = 'block';
            document.getElementById('hero-desc').textContent = 'This workflow could not be loaded. It may have been moved or is temporarily unavailable.';
            document.getElementById('wf-content').innerHTML = `
                <div style="text-align:center; padding:60px 0;">
                    <i class="fas fa-unlink" style="font-size:3rem; color:var(--text-dim); margin-bottom:20px; display:block;"></i>
                    <h2 style="font-size:1.2rem; margin-bottom:12px;">Unable to load workflow</h2>
                    <p style="color:var(--text-muted); margin-bottom:28px;">The file may have moved or GitHub is temporarily unavailable.</p>
                    <a href="workflows.html" style="display:inline-flex; align-items:center; gap:8px; background:var(--primary); color:#000; padding:12px 24px; border-radius:10px; font-weight:800; text-decoration:none; font-size:0.85rem;">
                        <i class="fas fa-arrow-left"></i> Back to Registry
                    </a>
                </div>`;
        }
    }

    function buildTOC() {
        const headings = document.querySelectorAll('#wf-content h2, #wf-content h3');
        if (!headings.length) return;
        const toc = document.getElementById('toc-body');
        const card = document.getElementById('toc-card');
        card.style.display = 'block';
        headings.forEach((h, i) => {
            h.id = 'section-' + i;
            const a = document.createElement('a');
            a.href = '#section-' + i;
            a.className = 'toc-link' + (h.tagName === 'H3' ? ' toc-h3' : '');
            a.textContent = h.textContent;
            toc.appendChild(a);
        });
        // IntersectionObserver for active state
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
                    const link = toc.querySelector(`a[href="#${e.target.id}"]`);
                    if (link) link.classList.add('active');
                }
            });
        }, { rootMargin: '-20% 0px -70% 0px' });
        headings.forEach(h => observer.observe(h));
    }


    const FALLBACK_HTML = `
        <div style="text-align:center;padding:12px 0;color:var(--text-dim);font-size:0.78rem;">
            <i class="fas fa-clock" style="margin-bottom:6px;display:block;font-size:1.2rem;"></i>
            Data not available currently.
        </div>`;

    const CACHE_TTL = 6 * 60 * 60 * 1000; // 6 hours

    function ghCache(key) {
        try {
            const raw = localStorage.getItem('gh_' + key);
            if (!raw) return null;
            const { data, ts } = JSON.parse(raw);
            if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem('gh_' + key); return null; }
            return data;
        } catch { return null; }
    }

    function ghCacheSet(key, data) {
        try { localStorage.setItem('gh_' + key, JSON.stringify({ data, ts: Date.now() })); } catch {}
    }

    function applyFiles(files) {
        if (Array.isArray(files) && files.length) {
            document.getElementById('tree-box').innerHTML = files.slice(0, 6).map(f =>
                `<div class="tree-node"><i class="fas ${f.type === 'dir' ? 'fa-folder' : 'fa-file-code'}"></i>${f.name}</div>`
            ).join('');
        } else {
            document.getElementById('tree-box').innerHTML = FALLBACK_HTML;
        }
    }

    function applyContribs(users) {
        if (Array.isArray(users) && users.length) {
            document.getElementById('contrib-stack').innerHTML = users.map(u =>
                `<img src="${u.avatar_url}" title="${u.login}" alt="${u.login}">`
            ).join('');
        } else {
            document.getElementById('contrib-stack').innerHTML = FALLBACK_HTML;
        }
    }

    async function fetchGitHub(owner, repo) {
        const cacheKey = `${owner}_${repo}`;

        // Serve from cache if fresh
        const cachedFiles = ghCache(cacheKey + '_files');
        const cachedUsers = ghCache(cacheKey + '_users');
        if (cachedFiles) applyFiles(cachedFiles);
        if (cachedUsers) applyContribs(cachedUsers);
        if (cachedFiles && cachedUsers) return; // fully cached, no API call

        try {
            const toFetch = [];
            if (!cachedFiles) toFetch.push(fetch(`https://api.github.com/repos/${owner}/${repo}/contents`));
            if (!cachedUsers) toFetch.push(fetch(`https://api.github.com/repos/${owner}/${repo}/contributors?per_page=6`));

            const results = await Promise.all(toFetch);
            let idx = 0;

            if (!cachedFiles) {
                const r1 = results[idx++];
                const files = r1.ok ? await r1.json() : [];
                ghCacheSet(cacheKey + '_files', files);
                applyFiles(files);
            }
            if (!cachedUsers) {
                const r2 = results[idx++];
                const users = r2.ok ? await r2.json() : [];
                ghCacheSet(cacheKey + '_users', users);
                applyContribs(users);
            }

        } catch (e) {
            if (!cachedFiles) document.getElementById('tree-box').innerHTML = FALLBACK_HTML;
            if (!cachedUsers) document.getElementById('contrib-stack').innerHTML = FALLBACK_HTML;
        }
    }

    function toggleTheme() {
        const b = document.body;
        const i = document.querySelector('.theme-toggle i');
        b.classList.toggle('light-mode');
        if (b.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');
            i.classList.replace('fa-moon', 'fa-sun');
        } else {
            localStorage.setItem('theme', 'dark');
            i.classList.replace('fa-sun', 'fa-moon');
        }
    }

    window.onload = init;
</script>
</body>
</html>
